# ╔═══════════════════════════════════════════════════════╗
# ║           Kitty Terminal — Catppuccin Mocha           ║
# ╚═══════════════════════════════════════════════════════╝

# ── Fonts ──────────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        13.0

# Fallback fonts (if Nerd Font isn't installed)
# font_family      Fira Code
# font_family      monospace

adjust_line_height  110%
adjust_column_width 0

# ── Cursor ─────────────────────────────────────────────────────────────────────
cursor                #f5e0dc
cursor_text_color     #1e1e2e
cursor_shape          beam
cursor_beam_thickness 1.8
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# ── Scrollback ─────────────────────────────────────────────────────────────────
scrollback_lines      10000
scrollback_pager_history_size 0
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 1.0

# ── Mouse ──────────────────────────────────────────────────────────────────────
mouse_hide_wait       3.0
url_color             #89b4fa
url_style             curly
open_url_with         default
url_prefixes          file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh
detect_urls           yes
copy_on_select        no
focus_follows_mouse   no

# ── Performance ────────────────────────────────────────────────────────────────
repaint_delay         10
input_delay           3
sync_to_monitor       yes

# ── Bell ───────────────────────────────────────────────────────────────────────
enable_audio_bell     no
visual_bell_duration  0.0
window_alert_on_bell  yes
bell_on_tab           "🔔 "

# ── Window Layout ──────────────────────────────────────────────────────────────
remember_window_size  yes
initial_window_width  1200
initial_window_height 750
window_resize_step_cells 2
window_resize_step_lines 2

window_border_width   1px
draw_minimal_borders  yes
window_margin_width   0
single_window_margin_width -1
window_padding_width  10

placement_strategy    center
active_border_color   #cba6f7
inactive_border_color #313244
bell_border_color     #f9e2af

hide_window_decorations no
resize_debounce_time  0.1
resize_draw_strategy  static
resize_in_steps       no

# ── Tab Bar ────────────────────────────────────────────────────────────────────
tab_bar_edge          bottom
tab_bar_margin_width  0.0
tab_bar_margin_height 4.0 4.0
tab_bar_style         powerline
tab_bar_align         left
tab_bar_min_tabs      1
tab_switch_strategy   previous
tab_fade              0.25 0.5 0.75 1

tab_powerline_style   slanted

tab_separator         ""
tab_title_max_length  30
tab_title_template    " {fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title} "
active_tab_title_template  " {fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title} "

active_tab_foreground   #1e1e2e
active_tab_background   #cba6f7
active_tab_font_style   bold
inactive_tab_foreground #cdd6f4
inactive_tab_background #313244
inactive_tab_font_style normal

tab_bar_background      #181825
tab_bar_margin_color    #181825

# ── Color Scheme — Catppuccin Mocha ────────────────────────────────────────────
foreground              #cdd6f4
background              #1e1e2e
background_opacity      1.0
background_blur         0

selection_foreground    #1e1e2e
selection_background    #cba6f7

# Normal colors
color0   #45475a
color1   #f38ba8
color2   #a6e3a1
color3   #f9e2af
color4   #89b4fa
color5   #f5c2e7
color6   #94e2d5
color7   #bac2de

# Bright colors
color8   #585b70
color9   #f38ba8
color10  #a6e3a1
color11  #f9e2af
color12  #89b4fa
color13  #f5c2e7
color14  #94e2d5
color15  #a6adc8

# Extended palette
color16  #fab387
color17  #f2cdcd

# ── Advanced ───────────────────────────────────────────────────────────────────
shell                    .
editor                   .
close_on_child_death     no
allow_remote_control     yes
listen_on                none
update_check_interval    0
startup_session          none
clipboard_control        write-clipboard write-primary read-clipboard-ask read-primary-ask
clipboard_max_size       64
file_transfer_confirmation_bypass no
allow_hyperlinks         yes
shell_integration        enabled
allow_cloning            ask
term                     xterm-256color

# ── Keyboard Shortcuts ─────────────────────────────────────────────────────────
kitty_mod ctrl+shift

# ── Tabs ───────────────────────────────────────────────────────────────────────
map kitty_mod+t         new_tab_with_cwd
map kitty_mod+w         close_tab
map kitty_mod+right     next_tab
map kitty_mod+left      previous_tab
map kitty_mod+1         goto_tab 1
map kitty_mod+2         goto_tab 2
map kitty_mod+3         goto_tab 3
map kitty_mod+4         goto_tab 4
map kitty_mod+5         goto_tab 5
map kitty_mod+6         goto_tab 6
map kitty_mod+7         goto_tab 7
map kitty_mod+8         goto_tab 8
map kitty_mod+9         goto_tab 9
map kitty_mod+q         close_tab
map kitty_mod+alt+t     set_tab_title

# ── Windows / Splits ───────────────────────────────────────────────────────────
map kitty_mod+enter     new_window_with_cwd
map kitty_mod+n         new_os_window_with_cwd
map kitty_mod+]         next_window
map kitty_mod+[         previous_window
map kitty_mod+f         move_window_forward
map kitty_mod+b         move_window_backward
map kitty_mod+`         move_window_to_top
map kitty_mod+r         start_resizing_window
map kitty_mod+alt+up    neighboring_window up
map kitty_mod+alt+down  neighboring_window down
map kitty_mod+alt+left  neighboring_window left
map kitty_mod+alt+right neighboring_window right

# ── Layouts ────────────────────────────────────────────────────────────────────
map kitty_mod+l         next_layout
enabled_layouts         tall,stack,fat,grid,horizontal,vertical

# ── Clipboard ──────────────────────────────────────────────────────────────────
map kitty_mod+c         copy_to_clipboard
map kitty_mod+v         paste_from_clipboard
map kitty_mod+s         paste_from_selection
map shift+insert        paste_from_selection

# ── Scrolling ──────────────────────────────────────────────────────────────────
map kitty_mod+up        scroll_line_up
map kitty_mod+down      scroll_line_down
map kitty_mod+k         scroll_line_up
map kitty_mod+j         scroll_line_down
map kitty_mod+page_up   scroll_page_up
map kitty_mod+page_down scroll_page_down
map kitty_mod+home      scroll_home
map kitty_mod+end       scroll_end
map kitty_mod+z         scroll_to_prompt -1
map kitty_mod+x         scroll_to_prompt 1
map kitty_mod+h         show_scrollback

# ── Font size ──────────────────────────────────────────────────────────────────
map kitty_mod+equal     change_font_size all +1.0
map kitty_mod+plus      change_font_size all +1.0
map kitty_mod+minus     change_font_size all -1.0
map kitty_mod+0         change_font_size all 0

# ── Misc ───────────────────────────────────────────────────────────────────────
map kitty_mod+f11       toggle_fullscreen
map kitty_mod+f10       toggle_maximized
map kitty_mod+u         kitten unicode_input
map kitty_mod+f2        edit_config_file
map kitty_mod+escape    kitty_shell window
map kitty_mod+a>m       set_background_opacity +0.1
map kitty_mod+a>l       set_background_opacity -0.1
map kitty_mod+a>1       set_background_opacity 1
map kitty_mod+a>d       set_background_opacity default
map kitty_mod+delete    clear_terminal reset active
